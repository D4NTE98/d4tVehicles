<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>d4tVehicles Preview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app">
    <section class="panel">
        <header>
            <div>
                <h1>d4tVehicles</h1>
                <p>Legion Garage Preview</p>
            </div>
        </header>

        <div class="vehicles">
            <div class="vehicle">
                <div><strong>Sultan</strong><span>D4T12345 · Stored</span></div>
                <div class="bars"><span>Fuel 82%</span><span>Engine 94%</span><span>Body 88%</span></div>
                <button>Spawn</button>
            </div>
            <div class="vehicle">
                <div><strong>Elegy</strong><span>D4T22291 · Outside</span></div>
                <div class="bars"><span>Fuel 41%</span><span>Engine 73%</span><span>Body 69%</span></div>
                <button>Track</button>
            </div>
            <div class="vehicle">
                <div><strong>Buffalo</strong><span>D4T99104 · Impound</span></div>
                <div class="bars"><span>Fuel 100%</span><span>Engine 100%</span><span>Body 100%</span></div>
                <button>Pay Impound</button>
            </div>
        </div>
    </section>
</main>
</body>
</html>
